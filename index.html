<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduManage</title>
    <meta name="description" content="Full-stack school management system for students, teachers, and administrators">
    <meta property="og:title" content="EduManage">
    <meta name="twitter:title" content="EduManage">
    <meta property="og:description" content="Full-stack school management system for students, teachers, and administrators">
    <meta name="twitter:description" content="Full-stack school management system for students, teachers, and administrators">
    <!-- GitHub Pages SPA: khôi phục URL sau khi bị redirect bởi 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
